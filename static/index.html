<!DOCTYPE html>
<html>
<head>
    <title>Servidor Inteligente</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background-image: url("/static/miproyecto.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

.contenedor {
    background: rgba(0, 0, 0, 0.7);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 90%;
    max-width: 500px;
}

input, button {
    margin: 10px;
    padding: 10px;
    width: 90%;
    border-radius: 8px;
    border: none;
}

button:hover {
    background: #00bcd4;
    color: black;
}

pre {
    background: black;
    padding: 10px;
    border-radius: 10px;
    max-height: 200px;
    overflow: auto;
}

table {
    margin-top: 10px;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<script>
//  PROTEGER ACCESO
let user = localStorage.getItem("user");

if (!user) {
    window.location.href = "/static/login.html";
}
</script>

<div class="contenedor">

<h2>Usuario: <span id="usuarioActual"></span></h2>
<button onclick="logout()">Cerrar sesión</button>

<h1>Servidor Inteligente</h1>

<h2>Subir Archivo</h2>

<form id="form">
    <input type="file" id="file" required><br>
    <input type="number" id="prioridad" placeholder="Prioridad" min="0" required><br>

    <small style="color: #00e5ff;">
    ⚠ Solo números positivos (mayores o iguales a 0)
    </small><br>
    <button type="submit">Subir</button>
</form>

<hr>

<h2>Algoritmos</h2>

<button onclick="fifo()">FIFO</button>
<button onclick="roundRobin()">Round Robin</button>
<button onclick="prioridad()">Prioridades</button>
<button onclick="verHistorial()">Ver Historial</button>
<button onclick="limpiarHistorial()">Limpiar Historial</button>

<h3>Resultado</h3>
<pre id="resultado"></pre>

<h3>Gráfica</h3>
<canvas id="grafica"></canvas>

<h3>Historial</h3>
<table id="tablaHistorial" border="1" style="width:100%; color:white;">
<thead>
<tr>
<th>Archivo</th>
<th>Tamaño</th>
<th>Prioridad</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
document.getElementById("usuarioActual").textContent = user;

//  LOGOUT
function logout() {
    localStorage.removeItem("user");
    window.location.href = "/static/login.html";
}
</script>

<script>
//  SUBIR ARCHIVO
async function subirArchivo(e) {
    e.preventDefault();

    let file = document.getElementById("file").files[0];
    let prioridad = document.getElementById("prioridad").value;

    let formData = new FormData();
    formData.append("file", file);

    let response = await fetch(`/upload?user=${user}&prioridad=${prioridad}`, {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    document.getElementById("resultado").textContent =
        JSON.stringify(data, null, 2);

    alert("Archivo subido");

    //  ACTUALIZA HISTORIAL
    verHistorial();
}

document.getElementById("form").addEventListener("submit", subirArchivo);
</script>

<script>
// ⚙️ ALGORITMOS
async function fifo() {
    let response = await fetch(`/procesar?user=${user}`);
    let data = await response.json();
    document.getElementById("resultado").textContent =
        JSON.stringify(data, null, 2);
    dibujarGrafica(data);
}

async function roundRobin() {
    let quantum = prompt(
    "Ingrese el Quantum\n\n⚠ Recomendación:\nUsar valores mayores a 2000 si el computador no es muy potente",
    "2000"
);

if (!quantum || quantum <= 0) {
    alert("Ingrese un número válido mayor a 0");
    return;
}

    let response = await fetch(`/procesar_rr?user=${user}&quantum=${quantum}`);
    let data = await response.json();

    document.getElementById("resultado").textContent =
        JSON.stringify(data, null, 2);

    dibujarGrafica(data);
}

async function prioridad() {
    let response = await fetch(`/procesar_prioridad?user=${user}`);
    let data = await response.json();

    document.getElementById("resultado").textContent =
        JSON.stringify(data, null, 2);

    dibujarGrafica(data);
}
</script>

<script>
// 📜 HISTORIAL
async function verHistorial() {
    let response = await fetch(`/historial?user=${user}`);
    let data = await response.json();

    console.log("HISTORIAL:", data);

    let tbody = document.querySelector("#tablaHistorial tbody");
    tbody.innerHTML = "";

    data.forEach(p => {
        tbody.innerHTML += `
        <tr>
            <td>${p.nombre}</td>
            <td>${p.tamano}</td>
            <td>${p.prioridad}</td>
        </tr>`;
    });
}

async function limpiarHistorial() {
    await fetch(`/historial?user=${user}`, { method: "DELETE" });
    alert("Historial limpiado");
    verHistorial();
}
</script>

<script>
// 📊 GRÁFICA
let grafica = null;

function dibujarGrafica(data) {
    let labels = data.map(p => p.archivo);
    let tiempos = data.map(p => p.fin - p.inicio);

    const ctx = document.getElementById('grafica').getContext('2d');

    if (grafica) grafica.destroy();

    grafica = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Duración',
                data: tiempos
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true
        }
    });
}
</script>

<script>
// 🔥 CARGA INICIAL + ACTUALIZACIÓN AUTOMÁTICA
verHistorial();
setInterval(verHistorial, 3000);
</script>

</body>
</html>
