<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

<style>
body {
    margin: 0;
    height: 100vh;

    /*  fondo  */
    background: linear-gradient(135deg, #1f1c2c, #928dab);

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: Arial;
}

/*  contenedor */
.login-box {
    background: rgba(0, 0, 0, 0.8);
    padding: 50px;
    border-radius: 20px;

    text-align: center;
    width: 350px;

    box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
}

/*  título */
h2 {
    color: white;
    font-size: 32px;
    margin-bottom: 30px;
}

/*  inputs grandes */
input {
    width: 100%;
    padding: 15px;
    margin: 15px 0;

    border-radius: 10px;
    border: none;

    font-size: 18px;
}

/*  botón */
button {
    width: 100%;
    padding: 15px;

    border: none;
    border-radius: 10px;

    font-size: 18px;
    font-weight: bold;

    background: #00e5ff;
    color: black;

    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00bcd4;
    transform: scale(1.05);
}
</style>

</head>

<body>

<div class="login-box">

<h2>Iniciar Sesión</h2>

<input id="user" placeholder="Usuario">

<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

</div>

<script>
function login() {
    let user = document.getElementById("user").value.trim();
    let pass = document.getElementById("pass").value.trim();

    //  contraseña global
    if (pass === "12345678" && user !== "") {

        //  guardar usuario (CLAVE DEL SISTEMA)
        localStorage.setItem("user", user);

        //  redirigir a la app
        window.location.href = "/web";

    } else {
        alert("Usuario o contraseña incorrectos");
    }
}
</script>

</body>
</html>
